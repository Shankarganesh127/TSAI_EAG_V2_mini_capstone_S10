# ==========================================================
# Project Override Configuration
# ==========================================================
# Base defaults live in library folders:
# - logging_lib/default_config.yaml
# - llm_api_lib/default_config.yaml
#
# This file overrides library defaults for this project.
# Keep only values you want to customize.

logging:
  # Override logging defaults here
  level: DEBUG

  log_dir: logs
  log_file: app.log

  max_bytes: 10485760  # 10 MB

  backup_count: 5

  # Third-party loggers to silence (set to WARNING level)
  quiet_loggers:
    - httpcore
    - httpcore.http11
    - httpcore.connection
    - httpx
    - google_genai.models
    - urllib3
    - asyncio

llm:
  # Override LLM defaults here
  use_env: true

  #provider: local
  #model: openai/llama-3.1-8b-instruct
  #base_url: http://localhost:8000/v1
  #temperature: 0.2

  # Gemini configuration
  provider: gemini
  model: gemini-3.5-flash
  temperature: 0.2
