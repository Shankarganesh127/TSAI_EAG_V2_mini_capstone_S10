# ==========================================================
# Default Logging Library Configuration
# ==========================================================
# This file contains safe defaults for logging_lib.

logging:
  # Log severity: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: INFO

  # Log output location and file name
  log_dir: logs
  log_file: app.log

  # Rotate file when it reaches this size (bytes)
  max_bytes: 10485760  # 10 MB

  # Number of rotated log files to keep
  backup_count: 5

  # Log line format
  format_string: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
